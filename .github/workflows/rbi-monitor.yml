name: RBI Regulatory Monitor

on:
  schedule:
    # Runs at 8:30 AM IST daily (3:00 AM UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI
    inputs:
      force_notify:
        description: 'Force notification even if no new items'
        required: false
        default: 'false'

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit state file back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore seen-items cache
        uses: actions/cache@v4
        with:
          path: data/seen_items.json
          key: rbi-seen-items-${{ github.run_number }}
          restore-keys: |
            rbi-seen-items-

      - name: Create data directory
        run: mkdir -p data/pending_modules

      - name: Run RBI monitor
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python rbi_monitor.py

      - name: Commit state and pending modules
        run: |
          git config user.name "RBI Monitor Bot"
          git config user.email "monitor@legodesk.com"
          git add data/
          git diff --staged --quiet || git commit -m "RBI monitor run — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        continue-on-error: true   # don't fail if nothing to commit

      - name: Upload pending modules as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pending-academy-modules-${{ github.run_number }}
          path: data/pending_modules/
          retention-days: 30
